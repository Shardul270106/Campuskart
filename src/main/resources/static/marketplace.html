<!-- SELL MODAL -->

<!-- CART DRAWER -->

                Checkout

    </div>
</div>

<!-- PAYMENT MODAL (OLX STYLE) -->
<div id="checkoutModal" class="fixed inset-0 hidden bg-black/60 flex items-center justify-center z-50">
    <div class="bg-white p-6 rounded w-full max-w-sm">
        <h2 class="text-xl font-bold mb-4 text-center">Choose Payment Method</h2>

        <div class="space-y-3">
            <button onclick="selectPayment('UPI')"
                    class="w-full border p-3 rounded flex justify-between items-center hover:bg-gray-100">
                <span>UPI</span>

            </button>
            <button onclick="selectPayment('Meet and pay')"
                    class="w-full border p-3 rounded flex justify-between items-center hover:bg-gray-100">
                <span>Meet and pay</span>
                <span>➜</span>
            </button>
            <button onclick="selectPayment('COD')"
                    class="w-full border p-3 rounded flex justify-between items-center hover:bg-gray-100">
                <span>Cash on Delivery</span>

    </div>
</div>

<!-- INVOICE -->
<div id="invoiceModal" class="fixed inset-0 hidden bg-black/60 flex items-center justify-center z-50">
    <div class="bg-white p-6 rounded w-full max-w-lg">

        <div id="invoice"></div>
        <button onclick="closeInvoice()" class="mt-4 w-full bg-indigo-600 text-white py-2 rounded">

    </div>
</div>

<div id="imageModal"
     class="fixed inset-0 hidden bg-black/70 flex items-center justify-center z-50">

    <div class="relative bg-white p-4 rounded-lg max-w-lg w-full">
        <button onclick="closeImageModal()"
                class="absolute top-2 right-2 text-xl">✖</button>

        <img id="modalImage"

</div>

    /* ---------- FETCH PRODUCTS FROM BACKEND ---------- */

    function showToast(message, type = "success") {

    let bgColor = "#16a34a"; // green

    if (type === "error") bgColor = "#dc2626";     // red
    if (type === "info") bgColor = "#2563eb";      // blue
    if (type === "warning") bgColor = "#f59e0b";   // orange

    Toastify({
        text: message,
        duration: 2500,
        gravity: "top",   // top or bottom
        position: "center",   // left, center, right
        close: true,
        stopOnFocus: true,
        style: {
            background: bgColor,
            borderRadius: "8px",
            fontFamily: "Poppins"
        }
    }).showToast();
}

function openImageModal(src) {

    const img = document.getElementById("modalImage");

}

function closeImageModal() {

    /* ---------- CART ---------- */
function addToCart(itemId) {
  if (cart.length > 0) {
   showToast("Second-hand items can only be bought one at a time", "warning");

    return;
  }

  const item = products.find(p => p.itemId == itemId);
  if (!item) return;

  cart.push({ ...item });
  updateCart();
  showToast("Item added to cart","success");
}


function updateCart() {
  cartItems.innerHTML = "";

  if (cart.length === 0) {
    cartTotal.textContent = 0;
    cartCount.classList.add("hidden");
    return;
  }

  const c = cart[0];

  cartItems.innerHTML = `
    <div class="flex justify-between">
      <span>${c.itemname}</span>
      <span>₹${c.price}</span>
    </div>
  `;

  cartTotal.textContent = c.price;
  cartCount.textContent = 1;
  cartCount.classList.remove("hidden");
}


    function changeQty(i, d) {
        cart[i].qty += d;
        if (cart[i].qty <= 0) cart.splice(i, 1);
        updateCart();
    }

async function confirmPurchase() {
  if (!loggedUser) {
    showToast("Please login first","error");
    window.location.href = "login.html";
    return;
  }

  if (cart.length !== 1) {
    showToast("Invalid cart","error");
    return;
  }

  if (!selectedPaymentMethod) {
    showToast("Select payment method", "warning");
    return;
  }

  const email = document.getElementById("buyerEmail").value;
  if (!email) {
    showToast("Enter email","warning");
    return;
  }

  const item = cart[0];

  const payload = {
    itemid: Number(item.itemId),
    username: loggedUser,
    email: email
  };

  try {
    const res = await fetch("http://localhost:8082/buyitems", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const message = await res.text();

    if (!res.ok) {
      alert(message);
      return;
    }

   showToast("Order placed successfully using " + selectedPaymentMethod, "info");


    // Reset UI
    cart = [];
    updateCart();
    selectedPaymentMethod = "";
    document.getElementById("buyerEmail").value = "";

    checkoutModal.classList.add("hidden");

    // Reload products
    fetchProducts();

  } catch (err) {
    console.error("Buy failed:", err);
    showToast("Purchase failed", "error");

  }
}
let stompClient = null;
let activeRoomId = null;

async function openChat(itemOwnerId, itemId) {

    const currentUserId = Number(localStorage.getItem("loggedUserId"));
    let room = null;

    // ===== SELLER =====
    if (currentUserId === itemOwnerId) {

        const res = await fetch(
            `http://localhost:8082/api/chat/rooms/seller/${currentUserId}`
        );

        const rooms = await res.json();

        if (rooms.length === 0) {
            showToast("💬No buyer has started chat yet","message");
            return;
        }

        room = rooms[0]; // open first chat for now
    }

    // ===== BUYER =====
    else {

        const res = await fetch(
            `http://localhost:8082/api/chat/room?buyerUserId=${currentUserId}&sellerUserId=${itemOwnerId}&itemId=${itemId}`,
            { method: "POST" }
        );

        room = await res.json();
    }

    activeRoomId = room.id;

    // ===== LOAD HISTORY =====
    const historyRes = await fetch(
        `http://localhost:8082/api/chat/messages/${activeRoomId}`
    );

    const history = await historyRes.json();

    const box = document.getElementById("chatMessages");
    box.innerHTML = "";
    history.forEach(addMsg);

    await connectSocket();

    document.getElementById("chatModal").classList.remove("hidden");
}
async function openSellerChats() {

    const sellerId = Number(localStorage.getItem("loggedUserId"));

    const res = await fetch(`http://localhost:8082/api/chat/rooms/seller/${sellerId}`);
    const rooms = await res.json();

    if (rooms.length === 0) {
        showToast("💬No buyer has started chat yet");
        return;
    }

    const list = document.getElementById("chatList");
    list.innerHTML = "";

    rooms.forEach(room => {
        const div = document.createElement("div");
        div.className = "p-3 border-b cursor-pointer hover:bg-gray-100";

        div.innerHTML = `
          <div class="font-semibold">Buyer ID: ${room.buyerUserId}</div>
          <div class="text-xs text-gray-500">Item ID: ${room.itemId}</div>
        `;

        div.onclick = () => {
            closeChatList();
            openChatByRoomId(room.id);
        };

        list.appendChild(div);
    });

    document.getElementById("chatListModal").classList.remove("hidden");
}
async function openChatByRoomId(roomId) {

    activeRoomId = roomId;

    const historyRes = await fetch(`http://localhost:8082/api/chat/messages/${activeRoomId}`);
    const history = await historyRes.json();

    const box = document.getElementById("chatMessages");
    box.innerHTML = "";
    history.forEach(addMsg);

    await connectSocket();
    document.getElementById("chatModal").classList.remove("hidden");
}

function connectSocket() {

    return new Promise((resolve, reject) => {

        const subscribeToRoom = () => {
            console.log("Subscribing to:", activeRoomId);

            stompClient.subscribe("/topic/chat/" + activeRoomId, (msg) => {
                addMsg(JSON.parse(msg.body));
            });

            resolve();
        };

        // already connected → ONLY resubscribe
        if (stompClient && stompClient.connected) {
            subscribeToRoom();
            return;
        }

        const socket = new SockJS("http://localhost:8082/ws-chat");
        stompClient = Stomp.over(socket);

        stompClient.connect({}, () => {
            subscribeToRoom();
        }, reject);
    });
}


function sendChat() {
    if (!stompClient || !stompClient.connected) return;

    const input = document.getElementById("chatInput");
    const text = input.value.trim();
    if (!text) return;

    stompClient.send("/app/chat.send", {}, JSON.stringify({
        chatRoomId: activeRoomId,
        senderUserId: Number(localStorage.getItem("loggedUserId")),
        senderName: localStorage.getItem("loggedUser"),
        content: text
    }));

    input.value = "";
}


function addMsg(m) {
    const box = document.getElementById("chatMessages");
    const me = Number(localStorage.getItem("loggedUserId"));

    const wrapper = document.createElement("div");
    wrapper.className = "flex mb-2 " + (m.senderUserId === me ? "justify-end" : "justify-start");

    const bubble = document.createElement("div");
    bubble.className = "px-3 py-2 rounded-2xl max-w-[70%] break-words " +
        (m.senderUserId === me ? "bg-indigo-600 text-white" : "bg-gray-200 text-black");

    // Add sender name
    const name = document.createElement("div");
    name.className = "text-xs font-semibold opacity-70 mb-1";
    name.textContent = m.senderUserId === me ? "You" : m.senderName;

    // Add message content
    const msg = document.createElement("div");
    msg.textContent = m.content;

    // Append name and message to bubble
    bubble.appendChild(name);
    bubble.appendChild(msg);

    wrapper.appendChild(bubble);
    box.appendChild(wrapper);

    // Auto scroll
    box.scrollTop = box.scrollHeight;
}


function closeChat() {
    document.getElementById("chatModal").classList.add("hidden");
}

    function closeChatList() {
    document.getElementById("chatListModal").classList.add("hidden");
}

    box.innerHTML += `
      <div class="flex justify-start mb-2">
        <div class="bg-gray-200 px-4 py-2 rounded-2xl max-w-[70%] break-words shadow-sm">
          ${text}
        </div>
      </div>`;
    box.scrollTop = box.scrollHeight;
}
function addProductCard(item) {
    const box = document.getElementById("chatMessages");

    const path = (item.imagepath || "").trim(); // 🔥 trim fixes hidden spaces

    const imgSrc = path.startsWith("data:")
        ? path                    // base64
        : window.location.origin + "/" + path; // file path

    box.innerHTML += `
      <div class="flex justify-start mb-2">
        <div class="bg-white border rounded-xl shadow p-3 flex gap-3 items-center max-w-[70%]">

          <img src="${imgSrc}"
               class="w-16 h-16 rounded-lg object-cover border cursor-pointer"
               onclick="openImageModal('${imgSrc}')"/>

          <div>
            <div class="font-semibold">${item.itemname}</div>
            <div class="text-sm text-gray-600">₹ ${item.price}</div>
          </div>

        </div>
      </div>
    `;

    box.scrollTop = box.scrollHeight;
}


/* ===== typing animation ===== */
function addTyping() {
    const box = document.getElementById("chatMessages");

    const div = document.createElement("div");
    div.id = "typing";
    div.className = "text-gray-400 text-sm";
    div.innerText = "CampusKart AI typing...";
    box.appendChild(div);

    box.scrollTop = box.scrollHeight;
}

function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
}

/* close chat resets mode */
function closeChat() {
    aiMode = false;
    document.getElementById("chatModal").classList.add("hidden");
}

    /* ================= VOICE AI ================= */

// 🎤 speech → text
function startVoiceAI() {
    const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;

    const recognition = new SpeechRecognition();

    recognition.lang = "en-IN";
    recognition.interimResults = true; // optional, allows live text
    recognition.start();

    const input = document.getElementById("chatInput");

    recognition.onresult = function(e) {
        let transcript = "";
        for (let i = 0; i < e.results.length; i++) {
            transcript += e.results[i][0].transcript;
        }

        // Put the recognized text in the input box ONLY
        input.value = transcript;
    };

    recognition.onerror = () => {
        console.log("Mic error ❌");
    };
}



// send recognized text to backend
async function sendVoiceTextToAI(text) {

    addTyping();

    const res = await fetch("http://localhost:8082/api/ai/chat", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({message:text})
    });

    const data = await res.json();

    removeTyping();

    addAiMessage(data.answer);

    speakAI(data.answer);

    data.items.forEach(addProductCard);
}


// 🔊 text → speech
function speakAI(text) {

    const speech = new SpeechSynthesisUtterance(text);

    speech.lang = "en-IN";
    speech.rate = 1;

    window.speechSynthesis.cancel(); // stop old voice
    window.speechSynthesis.speak(speech);
}
